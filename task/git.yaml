# Taskfile include for Git stuff
#

version: '3'

tasks:
  check-modification:
    - cmd: >
        if [ -z '{{.CHECK_PATH}}' ]; then
          status="$(git status --porcelain=v1)";
        else
          status="$(git status --porcelain=v1 | rg '{{.CHECK_PATH}}' || true)";
        fi;
        if ! [ -z "$status" ]; then 
          if [ -z '{{.CHECK_PATH}}' ]; then
            git status --porcelain=v1;
          else
            git status --porcelain=v1 || rg '{{.CHECK_PATH}}';
          fi;
          echo '{{.CHECK_MESSAGE}}';
          exit 2;
        fi
      silent: true
    - cmd: echo 'modification check passed!'
      silent: true
