# Taskfile include for Git stuff
#

version: '3'

tasks:
  check-modification:
    - cmd: >
        status="$(git status --porcelain=v1)";
        if ! [ -z '{{.CHECK_PATH}}' ]; then
          status="$(echo \"$status\" | rg '{{.CHECK_PATH}}' || true)";
        fi;
        if ! [ -z "$status" ]; then 
          echo "$status";
          echo '{{.CHECK_MESSAGE}}';
          exit 2;
        fi
      silent: true
    - cmd: echo 'modification check passed!'
      silent: true
