# Taskfile include for Containers
#

version: '3'

tasks:
  build:
    desc: Build docker image with buildx
    cmds:
      - docker buildx build --load {{.ARGS}} -t {{.DOCKER_IMAGE}} .

  run:
    cmds:
      - cmd: docker run {{.DOCKER_RUN_FLAGS}} {{.DOCKER_IMAGE}}
        ignore_error: true


  run-rm:
    desc: Run container with auto-remove
    cmds:
      - docker run --rm {{.DOCKER_RUN_FLAGS}} {{.DOCKER_IMAGE}} {{.ARGS}}
  
  connect:
    cmds:
      - cmd: docker exec -it $(docker container ls -q --filter ancestor={{.DOCKER_IMAGE}}) /bin/sh
        ignore_error: true 

  stop:
    cmds:
      - docker stop $(docker ps -q -a --filter ancestor={{.DOCKER_IMAGE}})

  clean:
    cmds:
      - docker container prune -f
      - cmd: docker image rm $(docker image ls -q -a --filter reference={{.DOCKER_IMAGE}})
        ignore_error: true

  nuke:
    - docker image prune -f # delete images which may help 'rm' pass
    - task: clean
    - docker image prune -f
    - cmd: "echo 'buildx cache not cleaned: run `docker buildx prune` to clean them [will slow down next docker build]'"
      silent: true


