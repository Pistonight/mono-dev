# Taskfile include for JS ecosystem
#

version: '3'

tasks:
  config:
    - pnpm exec mono config
  check:
    - pnpm exec mono check
  fix:
    - pnpm exec mono check --fix

  test-dev:
    - cmd: pnpm exec mono test --watch
      ignore_error: true

  test:
    - pnpm exec mono test run

  lib-build:
    - pnpm exec mono build

  doc-build:
    - pnpm exec mono doc
  doc-dev:
    cmds:
      - >
        shwoop docs {{.SHWOOP_ARGS| default "-w src" }} --host --
        pnpm exec mono doc

  app-build:
    deps: [config] # needed for subpath mapping
    cmds:
      - pnpm exec vite build

  app-dev:
    deps: [config]
    cmds:
      - cmd: pnpm exec vite dev --host
        ignore_error: true

  publish:
    - pnpm exec mono publish
