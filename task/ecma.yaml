# Taskfile include for JS ecosystem
#

version: '3'

tasks:
  config:
    - pnpm exec monolint --config
  check-clean:
    - pnpm exec monolint --clean
  check:
    - pnpm exec monolint
  fix:
    - pnpm exec monolint --fix

  test-dev:
    - cmd: pnpm exec monotest --watch
      ignore_error: true

  test:
    - pnpm exec monotest run

  lib-build:
    - pnpm exec monolibbuild

  doc-build:
    - pnpm exec monotypedoc
  doc-dev:
    - pnpm exec monotypedoc -w &
    - cmd: live-server -p 8081 docs --poll
      ignore_error: true
     


  vite-dev:
    deps: [config]
    cmds:
      - cmd: pnpm exec vite dev --host
        ignore_error: true

  vite-build:
    deps: [config]
    cmds:
      - pnpm exec vite build

