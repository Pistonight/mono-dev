# Taskfile include for JS ecosystem
#

version: '3'

tasks:
  config:
    - pnpm exec monolint --config
  check-clean:
    - pnpm exec monolint --clean
  check:
    - pnpm exec monolint
  fix:
    - pnpm exec monolint --fix

  vitest-dev:
    - cmd: pnpm exec vitest --watch
      ignore_error: true

  vitest:
    - pnpm exec vitest run

  lib-build:
    - pnpm exec monolibbuild
     


  vite-dev:
    deps: [config]
    cmds:
      - cmd: pnpm exec vite dev --host
        ignore_error: true

  vite-build:
    deps: [config]
    cmds:
      - pnpm exec vite build

