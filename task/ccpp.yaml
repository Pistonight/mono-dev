# Taskfile include for C/C++
#

version: '3'

tasks:
  fmt-check:
    cmds:
      - task: clang-format
        vars:
          CLANG_FORMAT_ARGS: -n -Werror
          SOURCE: '{{.SOURCE}}'
          ADD_STYLES: '{{.ADD_STYLES}}'

  fmt-fix:
    cmds:
      - task: clang-format
        vars:
          CLANG_FORMAT_ARGS: -i
          SOURCE: '{{.SOURCE}}'
          ADD_STYLES: '{{.ADD_STYLES}}'
          
  clang-format:
    vars:
      SOURCE_RESOLVED: '{{.SOURCE | default "."}}'
      STYLES_RESOLVED: >
        '{
        IndentWidth: 4,
        AccessModifierOffset: -4,
        PointerAlignment: Left,
        ColumnLimit: 100,
        BreakBeforeBraces: Custom,
        AllowShortFunctionsOnASingleLine: Inline,
        AllowShortIfStatementsOnASingleLine: Never,
        AllowShortNamespacesOnASingleLine: false,
        AllowShortBlocksOnASingleLine: Never,
        {{.ADD_STYLES | trim}} }'
    cmds:
      - task: clang-format-windows
        vars:
          SOURCE_RESOLVED: '{{.SOURCE_RESOLVED}}'
          STYLES_RESOLVED: '{{.STYLES_RESOLVED}}'
          CLANG_FORMAT_ARGS: '{{.CLANG_FORMAT_ARGS}}'
      - task: clang-format-unix
        vars:
          SOURCE_RESOLVED: '{{.SOURCE_RESOLVED}}'
          STYLES_RESOLVED: '{{.STYLES_RESOLVED}}'
          CLANG_FORMAT_ARGS: '{{.CLANG_FORMAT_ARGS}}'
  
  clang-format-windows:
    platforms: [windows]
    cmds:
      # there are multiple issues right now:
      # - find: [currently using uutils/findutils]
      #   - built-in task one doesn't support -regex
      # - xargs: [currently using task]
      #   - uutils/findutils allows -P but it's not implemented yet
      #   - uutils/findutils treats \ as escape so the path separators are nuked on Windows
      #   - built-in task one does not allow -P
      - >
        $(which find) {{.SOURCE_RESOLVED | trim }} -regextype posix-extended -regex '.*\.[ch](\+\+|pp|xx|c|h)'
        | xargs -n 1
        clang-format
        --style={{.STYLES_RESOLVED | trim }}
        {{.CLANG_FORMAT_ARGS}}
  clang-format-unix:
    platforms: [linux, darwin]
    cmds:
      - >
        find {{.SOURCE_RESOLVED | trim }} -regextype posix-extended -regex '.*\.[ch](\+\+|pp|xx|c|h)'
        | xargs -P $(nproc) -n 1
        clang-format
        --style={{.STYLES_RESOLVED | trim }}
        {{.CLANG_FORMAT_ARGS}}

  clang-tidy:
    vars:
      SOURCE_RESOLVED: '{{.SOURCE | default "." }}'
      BUILD_RESOLVED: '{{.BUILD | default "." }}'
      HEADER_RESOLVED: '{{.HEADER | default ".*" }}'
      CHECKS_RESOLVED: >
        '
        clang-analyzer-*,
        bugprone-*,
        performance-*,
        modernize-*,
        -modernize-use-trailing-return-type,
        readability-*,
        -readability-magic-numbers,
        {{.ADD_CHECKS | trim}}'

    cmds:
      - >
        clang-tidy --dump-config 
        --header-filter='{{.HEADER_RESOLVED}}'
        --checks={{.CHECKS_RESOLVED | trim}} > .clang-tidy
      - task: clang-tidy-windows
        vars:
          SOURCE_RESOLVED: '{{.SOURCE_RESOLVED}}'
          BUILD_RESOLVED: '{{.BUILD_RESOLVED}}'
          HEADER_RESOLVED: '{{.HEADER_RESOLVED}}'
          CHECKS_RESOLVED: '{{.CHECKS_RESOLVED}}'
      - task: clang-tidy-unix
        vars:
          SOURCE_RESOLVED: '{{.SOURCE_RESOLVED}}'
          BUILD_RESOLVED: '{{.BUILD_RESOLVED}}'
          HEADER_RESOLVED: '{{.HEADER_RESOLVED}}'
          CHECKS_RESOLVED: '{{.CHECKS_RESOLVED}}'

  clang-tidy-windows:
    platforms: [windows]
    cmds:
      # see clang-format-windows
      - >
        $(which find) {{.SOURCE_RESOLVED | trim }} -regextype posix-extended -regex '.*\.[ch](\+\+|pp|xx|c|h)'
        | xargs -n 1
        clang-tidy --warnings-as-errors='*' --header-filter='{{.HEADER_RESOLVED}}'
        -p {{.BUILD_RESOLVED | trim }}
        --checks={{.CHECKS_RESOLVED | trim }}
        --quiet
  clang-tidy-unix:
    platforms: [linux, darwin]
    cmds:
      - >
        find {{.SOURCE_RESOLVED | trim }} -regextype posix-extended -regex '.*\.[ch](\+\+|pp|xx|c|h)'
        | xargs -P $(nproc) -n 1
        clang-tidy --warnings-as-errors='*' --header-filter='{{.HEADER_RESOLVED}}'
        -p {{.BUILD_RESOLVED | trim }}
        --checks={{.CHECKS_RESOLVED | trim }}
        --quiet


