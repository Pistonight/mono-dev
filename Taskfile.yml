version: "3"

includes:
  mdbook:
    taskfile: ./task/mdbook.yaml
    internal: true

tasks:
  install:
    cmds:
      - pnpm install
      - task: install-deps

        # blocker: mdbook-admonish does not support mdbook 0.5
  # pull-book-update:
  #   desc: Update the book assets using newer mdbook version
  #   cmds:
  #     # can comment this out for efficiency,
  #     # but --force is needed so mdbook-admonish is built with latest mdbook
  #     - cargo install mdbook mdbook-admonish --force 
  #     - bun toolsets/mdbook/update.ts

  install-deps:
    cmds:
      - task: mdbook:install-theme
        vars:
          MDBOOK_TARGET: website
          MONO_DEV: .

  dev:
    cmds:
      - task: build-website
      - mdbook watch website &
      - live-server website/book -p 8081

  build-website:
    desc: (Re-)build the book
    cmds:
      - rm -rf website/book
      - mdbook build website

  check:
    dir: toolsets
    cmds:
      - node mono-lint/main.js

  fix:
    dir: toolsets
    cmds:
      - node mono-lint/main.js --fix

  git-push:
    cmds:
      - git remote set-url origin git@github.com:Pistonight/mono-dev
      - git push

  upgrade:
    - >-
      pnpm up
      @types/bun @types/node
      vite @babel/core @rolldown/plugin-babel @types/babel__core babel-plugin-react-compiler
      react react-dom @types/react @types/react-dom
      @vitejs/plugin-react
      vite-plugin-wasm
      vite-tsconfig-paths
      @eslint/js eslint eslint-plugin-react-hooks eslint-plugin-react-refresh
      globals
      @modyfi/vite-plugin-yaml
      typescript
      typescript-eslint
      js-yaml
      vitest
      typedoc
      serve
    - pnpm dedupe
    - pnpm dedupe --check
