version: "3"

includes:
  mdbook:
    taskfile: ./task/mdbook.yaml
    internal: true

tasks:
  install:
    desc: Install or sync project dependencies
    cmds:
      - pnpm install
      - task: copy-website-theme

        # blocker: mdbook-admonish does not support mdbook 0.5
  # pull-book-update:
  #   desc: Update the book assets using newer mdbook version
  #   cmds:
  #     # can comment this out for efficiency,
  #     # but --force is needed so mdbook-admonish is built with latest mdbook
  #     - cargo install mdbook mdbook-admonish --force 
  #     - bun toolsets/mdbook/update.ts

  copy-website-theme:
    desc: Copy mdbook themes from the toolset to the website
    cmds:
      - task: mdbook:install-theme
        vars:
          MDBOOK_TARGET: website
          MONO_DEV: .

  check:
    - node toolsets/js/src/monolint_main.js
  fix:
    - node toolsets/js/src/monolint_main.js --fix

  dev:
    cmds:
      - rm -rf website/book
      - shwoop website/book -w website --host -- mdbook build website

  build-website:
    desc: (Re-)build the book
    cmds:
      - rm -rf website/book
      - mdbook build website

  upgrade:
    desc: Upgrade dependencies
    cmds:
      - rm -rf node_modules
      - >-
        pnpm up
        @types/bun @types/node
        vite @babel/core @rolldown/plugin-babel @types/babel__core babel-plugin-react-compiler
        react react-dom @types/react @types/react-dom
        @vitejs/plugin-react
        vite-plugin-wasm
        @modyfi/vite-plugin-yaml
        @eslint/js eslint eslint-plugin-react-hooks eslint-plugin-react-refresh eslint-plugin-react-compiler
        globals
        typescript
        typescript-eslint
        js-yaml
        vitest
        typedoc typedoc-theme-oxide
      - pnpm dedupe
      - pnpm dedupe --check
